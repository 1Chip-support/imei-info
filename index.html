<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>iPhone IMEI Check</title>

<style>
body{
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont, "Segoe UI";
  background:#f2f2f7;
}

/* 📱 TOP SAFE SPACE (like iOS Settings) */
.safe-area{
  padding:40px 18px;   /* 👈 большие боковые поля */
  max-width:420px;
  margin:0 auto;       /* центр только как iOS */
}

/* TITLE */
h2{
  font-size:22px;
  font-weight:600;
  margin:10px 0 5px;
}

/* SUBTEXT */
.small{
  font-size:13px;
  color:#8e8e93;
  margin-bottom:20px;
}

/* 🧩 SETTINGS STYLE GROUP */
.group{
  background:white;
  border-radius:14px;
  overflow:hidden;
  border:1px solid #e5e5ea;
}

/* INPUTS LIKE iOS CELLS */
input{
  width:100%;
  padding:14px;

  border:none;
  outline:none;

  font-size:15px;
  background:white;
}

/* разделение строк как iOS */
.divider{
  height:1px;
  background:#e5e5ea;
  margin:0;
}

/* BUTTON */
button{
  width:100%;
  margin-top:14px;
  padding:14px;

  border:none;
  border-radius:14px;

  font-size:15px;
  cursor:pointer;
}

.check{
  background:#0071e3;
  color:white;
}

.pay{
  background:#34c759;
  color:white;
  display:none;
}
</style>
</head>

<body>

<div class="safe-area">

  <h2>iPhone IMEI Check</h2>
  <div class="small">Only for Apple devices</div>

  <!-- SETTINGS STYLE BLOCK -->
  <div class="group">

    <input id="imei" placeholder="IMEI">
    <div class="divider"></div>

    <input id="email" placeholder="Email">

  </div>

  <button class="check" onclick="check()">Check</button>
  <button id="payBtn" class="pay" onclick="pay()">Pay $1.99</button>

</div>

<script>
function check(){
  const imei = document.getElementById("imei").value;
  const email = document.getElementById("email").value;

  if(!imei || !email){
    alert("Fill all fields");
    return;
  }

  document.getElementById("payBtn").style.display="block";
}

function pay(){
  alert("Connect backend here");
}
</script>

</body>
</html>
