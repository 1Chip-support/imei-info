<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<title>1Chip</title>

<link rel="icon" type="image/jpeg" href="images/logo.jpeg">
<link rel="apple-touch-icon" href="images/logo.jpeg">

<meta name="description" content="IMEI Check service for Apple devices">

<style>
*{box-sizing:border-box;}

body{
margin:0;
font-family:-apple-system, BlinkMacSystemFont, "Segoe UI";
background:#f2f2f7;
overflow-x:hidden;
}

/* ===== iOS ANIMATION SYSTEM ===== */
@keyframes fadeUp{
from{opacity:0; transform:translateY(15px);}
to{opacity:1; transform:translateY(0);}
}

.screen{
padding:55px 16px calc(40px + env(safe-area-inset-bottom));
max-width:420px;
margin:0 auto;
animation:fadeUp 0.6s ease;
}

h2,.sub,.block,.row,button{
animation:fadeUp 0.6s ease;
}

h2{
font-size:22px;
font-weight:600;
margin:0 0 5px 0;
}

.sub{
font-size:13px;
color:#8e8e93;
margin-bottom:20px;
}

.logo{
display:flex;
justify-content:center;
margin-bottom:15px;
}

.logo img{
width:95px;
height:95px;
border-radius:50%;
object-fit:cover;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

.block{
background:#fff;
border-radius:14px;
border:1px solid #e5e5ea;
padding:12px;
margin-bottom:12px;
}

input{
width:100%;
padding:14px;
border:none;
outline:none;
font-size:15px;
transition:0.2s;
}

input:focus{
transform:scale(1.02);
}

.value{
padding:14px;
font-size:15px;
word-break:break-all;
}

.row{
padding:14px;
cursor:pointer;
font-size:15px;
border:1px solid #e5e5ea;
border-radius:12px;
margin-bottom:10px;
background:#fff;
transition:0.2s;
}

.row:active{
transform:scale(0.97);
}

.row.active{
border:2px solid #0a84ff;
background:#eef5ff;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:14px;
font-size:15px;
cursor:pointer;
margin-top:10px;
background:#0a84ff;
color:#fff;
font-weight:600;
transition:0.2s;
}

button:active{
transform:scale(0.96);
}

.pay{
background:#34c759;
}

.error{
background:#ff3b30;
color:#fff;
padding:12px;
border-radius:12px;
font-size:14px;
margin-bottom:10px;
animation:fadeUp 0.3s ease;
}

.loading{
text-align:center;
padding:20px;
font-size:14px;
color:#8e8e93;
animation:pulse 1.2s infinite;
}

@keyframes pulse{
0%{opacity:0.4;}
50%{opacity:1;}
100%{opacity:0.4;}
}

/* ===== NEW NOTIFICATION ===== */
.notice{
background:rgba(10,132,255,0.08);
border:1px solid rgba(10,132,255,0.2);
padding:12px;
border-radius:12px;
font-size:13px;
color:#0a84ff;
margin-top:10px;
animation:fadeUp 0.5s ease;
}
</style>
</head>

<body>

<div class="screen">

<div class="logo">
<img src="images/logo.jpeg">
</div>

<h2>IMEI Check</h2>
<div class="sub">Only for Apple devices</div>

<div class="block" id="imeiBlock">
<input id="imeiInput" placeholder="Enter IMEI/SN">
<button onclick="setIMEI()">Continue</button>
</div>

<div id="typeBlock"></div>
<div id="emailBlock"></div>
<div id="payBlock"></div>

</div>

<script>

const API_URL = "https://imei-info.onrender.com";

let imei = "";
let type = "";
let detectedType = "";

/* ---------- IMEI CHECK ---------- */
function setIMEI(){

imei = document.getElementById("imeiInput").value.trim();

const isIMEI = /^\d{15}$/.test(imei);
const isSN = /^(?=.*[A-Za-z])[A-Za-z0-9]{10,12}$/.test(imei);

if(!isIMEI && !isSN){
document.getElementById("imeiBlock").innerHTML =
`<div class="error">Invalid IMEI / SN</div>
<input id="imeiInput" placeholder="Enter IMEI/SN">
<button onclick="setIMEI()">Continue</button>`;
return;
}

detectedType = isIMEI ? "IMEI" : "SN";

document.getElementById("imeiBlock").innerHTML =
`<div class="loading">Checking device...</div>`;

setTimeout(()=>{
document.getElementById("imeiBlock").innerHTML =
`<div class="value">${detectedType}: <b>${imei}</b></div>`;
showType();
},1000);
}

/* ---------- TYPE ---------- */
function showType(){
document.getElementById("typeBlock").innerHTML = `
<div class="block">
<div class="row" onclick="setType(this,'carrier')">Carrier status</div>
<div class="row" onclick="setType(this,'findmy')">Find My iPhone</div>
<div class="row" onclick="setType(this,'blacklist')">Blacklist check</div>
</div>`;
}

function setType(el,t){
type = t;
document.querySelectorAll(".row").forEach(e=>e.classList.remove("active"));
el.classList.add("active");
showEmail();
}

/* ---------- EMAIL ---------- */
function showEmail(){
if(document.getElementById("emailBlock").innerHTML) return;

document.getElementById("emailBlock").innerHTML = `
<div class="block">
<input id="email" placeholder="Enter email">
</div>`;

/* ===== ADDED NOTIFICATION ===== */
const notice = document.createElement("div");
notice.className = "notice";
notice.innerText = "Your order will be processed within 24 hours";
document.getElementById("emailBlock").appendChild(notice);

/* ===== DELAY PAY BUTTON ===== */
setTimeout(()=>showPay(), 1200);
}

/* ---------- PAY ---------- */
function showPay(){
if(document.getElementById("payBlock").innerHTML) return;

document.getElementById("payBlock").innerHTML = `
<button class="pay" onclick="pay()">Pay $1.99</button>`;
}

async function pay(){

const email = document.getElementById("email").value.trim();

if(!imei || !type || !email){
alert("Fill all fields");
return;
}

const isEmail = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
if(!isEmail){
alert("Invalid email");
return;
}

const btn = document.querySelector(".pay");
btn.innerText = "Processing...";
btn.disabled = true;

try{

const res = await fetch(API_URL + "/create-payment",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
deviceId: imei,
email: email,
type: type
})
});

if(!res.ok) throw new Error();

const data = await res.json();

if(data.url){
window.location.href = data.url;
}else{
throw new Error();
}

}catch(e){
alert("Server error");
btn.innerText = "Pay $1.99";
btn.disabled = false;
}

}

</script>

</body>
</html>
