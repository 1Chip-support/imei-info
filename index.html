<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>IMEI Check</title>

<style>
body{
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont, "Segoe UI";
  background:#f2f2f7;
  overflow:hidden;
}

/* 🔥 TOP LAYOUT (НЕ ЦЕНТР!) */
.screen{
  padding:50px 18px;
  max-width:420px;
  margin:0 auto;
}

/* HEADER */
h2{
  font-size:22px;
  margin-bottom:6px;
}

.sub{
  font-size:13px;
  color:#8e8e93;
  margin-bottom:20px;
}

/* GROUP */
.group{
  background:white;
  border-radius:14px;
  overflow:hidden;
  border:1px solid #e5e5ea;
  margin-bottom:10px;
}

/* INPUT */
input{
  width:100%;
  padding:14px;
  border:none;
  outline:none;
  font-size:15px;
}

/* BUTTON */
button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:14px;
  margin-top:10px;
  font-size:15px;
}

.main{
  background:#0071e3;
  color:white;
}

.pay{
  background:#34c759;
  color:white;
  display:none;
}

/* MODAL */
.modal{
  position:fixed;
  bottom:-100%;
  left:0;
  width:100%;
  background:white;
  border-top-left-radius:20px;
  border-top-right-radius:20px;
  transition:0.3s;
  padding:20px;
}

/* OPEN */
.modal.show{
  bottom:0;
}

.opt{
  padding:14px;
  border-bottom:1px solid #eee;
  font-size:15px;
}

/* 🔥 SELECTED STYLE */
.opt.active{
  background:#e8f0ff;
  font-weight:600;
}
</style>
</head>

<body>

<div class="screen">

<h2>iPhone IMEI Check</h2>
<div class="sub">Only for Apple devices</div>

<div class="group">
  <input id="imei" placeholder="Enter IMEI">
</div>

<button class="main" onclick="openOptions()">
  Options
</button>

<div class="group">
  <input id="email" placeholder="Email">
</div>

<button class="main" onclick="check()">Check</button>
<button id="payBtn" class="pay" onclick="pay()">Pay $1.99</button>

</div>

<!-- MODAL -->
<div id="modal" class="modal">

  <div class="opt" onclick="selectType(this,'carrier')">Carrier status</div>
  <div class="opt" onclick="selectType(this,'findmy')">Find My iPhone</div>
  <div class="opt" onclick="selectType(this,'blacklist')">Blacklist check</div>

</div>

<script>

const API_URL = "https://imei-info.onrender.com";

let imei="", email="", type="carrier";
let selectedEl = null;

/* OPEN */
function openOptions(){
  document.getElementById("modal").classList.add("show");
}

/* SELECT TYPE */
function selectType(el, t){
  type = t;

  // remove old highlight
  if(selectedEl){
    selectedEl.classList.remove("active");
  }

  // add new highlight
  el.classList.add("active");
  selectedEl = el;

  document.getElementById("modal").classList.remove("show");

  console.log("TYPE SELECTED:", type); // 🔥 DEBUG
}

/* CHECK */
function check(){
  imei = document.getElementById("imei").value.trim();
  email = document.getElementById("email").value.trim();

  if(!imei || !email){
    alert("Fill all fields");
    return;
  }

  if(!type){
    type = "carrier";
  }

  document.getElementById("payBtn").style.display="block";
}

/* PAY */
async function pay(){

  console.log("SEND:", {imei, email, type}); // 🔥 DEBUG

  const res = await fetch(API_URL + "/create-payment", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      deviceId: imei,
      email: email,
      type: type
    })
  });

  const data = await res.json();

  if(data.url){
    window.location.href = data.url;
  } else {
    alert("Payment error");
  }
}

</script>

</body>
</html>
