<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<title>1Chip</title>

<link rel="icon" type="image/jpeg" href="images/logo.jpeg">
<link rel="apple-touch-icon" href="images/logo.jpeg">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a84ff">

<style>
*{box-sizing:border-box;}
body{margin:0;font-family:-apple-system;background:#f2f2f7;}
.screen{padding:55px 16px;max-width:420px;margin:0 auto;}

.block{background:#fff;border-radius:14px;padding:12px;margin-bottom:12px;}
input{width:100%;padding:14px;border:none;font-size:15px;}

.row{padding:14px;border:1px solid #e5e5ea;border-radius:12px;margin-bottom:10px;background:#fff;}

button{width:100%;padding:14px;border:none;border-radius:14px;background:#0a84ff;color:#fff;font-weight:600;}

.pay{background:#34c759;}

.error{background:#ff3b30;color:#fff;padding:12px;border-radius:12px;margin-bottom:10px;}
.loading{text-align:center;padding:20px;color:#8e8e93;}
</style>
</head>

<body>

<div class="screen">

<div class="block" id="imeiBlock">
<input id="imeiInput" placeholder="Enter IMEI or SN">
<button onclick="setIMEI()">Continue</button>
</div>

<div id="typeBlock"></div>
<div id="emailBlock"></div>
<div id="payBlock"></div>

</div>

<script>

/* 🔥 FIX: always HTTPS safe */
const API_URL = "https://130.61.122.182:3000";

let imei = "";
let type = "";

function setIMEI(){

imei = document.getElementById("imeiInput").value.trim();

const isIMEI = /^\d{15}$/.test(imei);
const isSN = /^[A-Za-z0-9]{10,12}$/.test(imei);

if(!isIMEI && !isSN){
document.getElementById("imeiBlock").innerHTML = `
<div class="error">Invalid IMEI / SN</div>
<input id="imeiInput">
<button onclick="setIMEI()">Continue</button>
`;
return;
}

document.getElementById("imeiBlock").innerHTML = `<div class="loading">Checking...</div>`;

setTimeout(()=>{
document.getElementById("imeiBlock").innerHTML = `<div>ID: <b>${imei}</b></div>`;
showType();
},800);

}

function showType(){

document.getElementById("typeBlock").innerHTML = `
<div class="block">
<div class="row" onclick="setType(this,'carrier')">Carrier status</div>
<div class="row" onclick="setType(this,'findmy')">Find My iPhone</div>
<div class="row" onclick="setType(this,'blacklist')">Blacklist check</div>
</div>`;
}

function setType(el,t){

type = t;
document.querySelectorAll(".row").forEach(e=>e.classList.remove("active"));
el.classList.add("active");

showEmail();
}

function showEmail(){

if(document.getElementById("emailBlock").innerHTML) return;

document.getElementById("emailBlock").innerHTML = `
<div class="block">
<input id="email" placeholder="Enter email">
</div>`;

showPay();
}

function showPay(){

if(document.getElementById("payBlock").innerHTML) return;

document.getElementById("payBlock").innerHTML = `
<button class="pay" onclick="payToCheck()">Pay $1.99</button>`;
}

/* 🔥 FIXED FETCH (Safari safe + no "Load failed") */
async function payToCheck(){

const email = document.getElementById("email").value.trim();

if(!imei || !type || !email){
alert("Fill all fields");
return;
}

try {

/* timeout protection */
const controller = new AbortController();
setTimeout(()=>controller.abort(), 12000);

const res = await fetch(API_URL + "/create-payment", {
method:"POST",
headers:{ "Content-Type":"application/json" },
body: JSON.stringify({ deviceId: imei, email, type }),
signal: controller.signal
});

const text = await res.text();

/* safe parse */
let data;
try { data = JSON.parse(text); }
catch(e){ throw new Error("Invalid server response"); }

if(data.url){
window.location.href = data.url;
} else {
throw new Error("No payment URL");
}

} catch(err){
console.log(err);
alert("Network error: " + err.message);
}

}

</script>

</body>
</html>
