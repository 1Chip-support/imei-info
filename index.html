<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IMEI Check</title>
  <style>
    /* Базовые стили для кнопки, чтобы она выглядела красиво */
    body { font-family: Arial, sans-serif; text-align: center; padding: 20px; }
    .pay {
      background-color: #28a745;
      color: white;
      padding: 15px 30px;
      font-size: 18px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 20px;
    }
    .pay:active { background-color: #218838; }
    input { padding: 10px; margin: 10px 0; width: 80%; max-width: 300px; }
  </style>
</head>
<body>

  <!-- Поля для ввода (убедись, что у тебя есть эти элементы на странице) -->
  <input type="text" id="imei" placeholder="Введите IMEI">
  <input type="email" id="email" placeholder="Введите Email">
  
  <!-- Сюда скрипт добавит кнопку -->
  <div id="payBlock"></div>

  <script>
    // Предположим, что переменные imei и type берутся откуда-то выше. 
    // Если они берутся из input, лучше считывать их прямо в функции payToCheck.
    // Для надежности я добавил считывание IMEI прямо из поля ввода:

    /* PAYMENT BUTTON CREATION */
    if(document.getElementById("payBlock").innerHTML) return;

    document.getElementById("payBlock").innerHTML = `
      <button class="pay" onclick="payToCheck()">
        Pay to Check $1.99
      </button>
    `;

    /* PAYMENT FUNCTION */
    async function payToCheck(){
      // Считываем значения полей
      const imeiInput = document.getElementById("imei").value.trim();
      const email = document.getElementById("email").value.trim();
      const type = "carrier"; // Или то значение type, которое тебе нужно

      // ИСПРАВЛЕНО: добавлены знаки || (ИЛИ) для правильной проверки
      if(!imeiInput  !type  !email){
        alert("Fill all fields (IMEI and Email)");
        return;
      }

      // Правильный адрес твоего сервера
      const SERVER_URL = "https://imei-info.pages.dev"; 

      try {
        const res = await fetch(SERVER_URL + "/create-payment", {
          method:"POST",
          headers:{"Content-Type":"application/json"},
          body: JSON.stringify({
            deviceId: imeiInput,
            email: email,
            type: type
          })
        });

        const data = await res.json();

        if(data.url){
          window.location.href = data.url; // Переход на Stripe
        } else {
          alert("Payment error: " + (data.error || "Unknown error"));
        }
      } catch (err) {
        console.error(err);
        alert("Connection error. Check your internet.");
      }
    }
  </script>

</body>
</html>
