<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<title>1Chip</title>

<!-- SEO -->
<meta name="description" content="Fast IMEI check service for Apple devices, carrier, blacklist and Find My iPhone status">
<meta name="application-name" content="1Chip">
<meta name="apple-mobile-web-app-title" content="1Chip">

<!-- iOS / PWA -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a84ff">

<!-- Favicon -->
<link rel="icon" href="images/logo.jpeg">
<link rel="apple-touch-icon" href="images/logo.jpeg">

<!-- Open Graph -->
<meta property="og:title" content="1Chip">
<meta property="og:site_name" content="1Chip">
<meta property="og:description" content="Only for Apple devices">
<meta property="og:image" content="https://imei-info.pages.dev/images/logo.jpeg">
<meta property="og:type" content="website">
<meta property="og:url" content="https://imei-info.pages.dev/">

<!-- Google verification -->
<meta name="google-site-verification" content="HRJpJ0clkSqAImGWA64Pq8LhbVVCt9oawE6DovFubx8">

<style>
*{box-sizing:border-box;}

body{
margin:0;
font-family:-apple-system, BlinkMacSystemFont, "Segoe UI";
background:#f2f2f7;
overflow-x:hidden;
}

/* Animations */
.fade-in{animation:fadeIn .5s ease;}
.slide-up{animation:slideUp .5s ease;}
.shake{animation:shake .4s cubic-bezier(.36,.07,.19,.97);}

@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
@keyframes shake{0%{transform:translateX(0);}20%{transform:translateX(-6px);}40%{transform:translateX(6px);}60%{transform:translateX(-4px);}80%{transform:translateX(4px);}100%{transform:translateX(0);}}

/* Layout */
.screen{
padding:55px 16px calc(40px + env(safe-area-inset-bottom));
max-width:420px;
margin:0 auto;
}

.logo{
display:flex;
justify-content:center;
margin-bottom:15px;
}

.logo img{
width:95px;
height:95px;
border-radius:50%;
object-fit:cover;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

h2{
font-size:22px;
font-weight:600;
margin:0 0 5px 0;
}

.sub{
font-size:13px;
color:#8e8e93;
margin-bottom:20px;
}

/* Blocks */
.block{
background:#fff;
border-radius:14px;
border:1px solid #e5e5ea;
padding:12px;
margin-bottom:12px;
}

/* Input */
input{
width:100%;
padding:14px;
border:none;
outline:none;
font-size:15px;
-webkit-appearance:none;
appearance:none;
}

/* Rows */
.row{
padding:14px;
cursor:pointer;
font-size:15px;
border:1px solid #e5e5ea;
border-radius:12px;
margin-bottom:10px;
background:#fff;
transition:all 0.2s ease;
}

.row:active{
background:#f0f0f5;
transform:scale(0.98);
}

.row.active{
border:2px solid #0a84ff;
background:#eef5ff;
}

/* Button */
button{
width:100%;
padding:14px;
border:none;
border-radius:14px;
font-size:15px;
cursor:pointer;
margin-top:10px;
background:#0a84ff;
color:#fff;
font-weight:600;
transition:all 0.2s ease;
}

button:active{
transform:scale(0.97);
opacity:0.9;
}

.pay{background:#34c759;}

.notice{
font-size:13px;
color:#8e8e93;
margin-top:8px;
text-align:center;
}

.error{
background:#ff3b30;
color:#fff;
padding:12px;
border-radius:12px;
font-size:14px;
margin-bottom:10px;
}

.loading{
text-align:center;
padding:20px;
font-size:14px;
color:#8e8e93;
}

.value{
padding:14px;
font-size:15px;
word-break:break-all;
}

.label{
font-size:12px;
color:#8e8e93;
margin-top:5px;
}

/* Back Button Circle */
.back-circle {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: #e5e5ea;
  color: #000;
  font-size: 32px;
  font-weight: 600;
  margin-right: 14px;
  cursor: pointer;
  transition: all 0.2s ease;
  flex-shrink: 0;
  border: none;
  padding: 0;
}

.back-circle:active {
  background: #d1d1d6;
  transform: scale(0.92);
}

/* Value Header */
.value-header {
  display: flex;
  align-items: center;
  gap: 0;
}

.value-header > div {
  display: flex;
  flex-direction: column;
  justify-content: center;
}
</style>
</head>

<body>

<div class="screen">

  <div class="logo fade-in">
    <img src="images/logo.jpeg" alt="logo">
  </div>

  <h2 class="fade-in">IMEI Check</h2>
  <div class="sub fade-in">Only for Apple devices</div>

  <!-- STEP 1 -->
  <div class="block slide-up" id="imeiBlock">
    <input id="imeiInput" type="text" placeholder="Enter IMEI/SN" autocapitalize="off" autocorrect="off">
    <button onclick="setIMEI()">Continue</button>
  </div>

  <!-- STEPS -->
  <div id="step-type"></div>
  <div id="step-email"></div>
  <div id="step-pay"></div>

</div>

<script>

const API_URL = "https://imei-info.onrender.com";

let imei = "";
let type = "";
let detectedType = "";
let isProcessing = false;

// XSS защита
function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// НАЗАД
function goBack(){
imei = "";
type = "";
detectedType = "";
isProcessing = false;
document.getElementById("imeiBlock").innerHTML = `
<input id="imeiInput" type="text" placeholder="Enter IMEI/SN" autocapitalize="off" autocorrect="off">
<button onclick="setIMEI()">Continue</button>
`;
document.getElementById("step-type").innerHTML = "";
document.getElementById("step-email").innerHTML = "";
document.getElementById("step-pay").innerHTML = "";
}

/* STEP 1 */
function setIMEI(){

const block = document.getElementById("imeiBlock");
imei = document.getElementById("imeiInput").value.trim();

const isIMEI = /^\d{15}$/.test(imei);
const isSN = /^(?=.*[A-Za-z])(?=.*\d)[A-Za-z0-9]{10,12}$/.test(imei);

if(isIMEI) detectedType = "IMEI";
else if(isSN) detectedType = "SN";
else{

block.classList.remove("shake");
void block.offsetWidth;
block.classList.add("shake");

block.innerHTML = `
<div class="error fade-in">❌ Invalid IMEI / SN</div>
<input id="imeiInput" type="text" placeholder="Enter IMEI/SN" autocapitalize="off" autocorrect="off">
<button onclick="setIMEI()">Continue</button>
`;
return;
}

block.innerHTML = `<div class="loading fade-in">Checking device...</div>`;

setTimeout(()=>{
const safeImei = escapeHtml(imei);
const safeType = escapeHtml(detectedType);
block.innerHTML = `
<div class="value slide-up">
<div class="value-header">
<button class="back-circle" onclick="goBack()">‹</button>
<div>
<div>${safeType}: <b>${safeImei}</b></div>
<div class="label">${safeType} detected</div>
</div>
</div>
</div>`;
showType();
},1200);

}

/* STEP 2 */
function showType(){

document.getElementById("step-type").innerHTML = `
<div class="block slide-up">

<div class="row" onclick="setType(this,'carrier')">Carrier status</div>
<div class="row" onclick="setType(this,'findmy')">Find My iPhone</div>
<div class="row" onclick="setType(this,'blacklist')">Blacklist check</div>

</div>`;
}

function setType(el,t){

type = t;

document.querySelectorAll(".row").forEach(e=>e.classList.remove("active"));
el.classList.add("active");

showEmail();
}

/* STEP 3 */
function showEmail(){

document.getElementById("step-email").innerHTML = `
<div class="block slide-up">
<input id="email" type="email" placeholder="Enter email" oninput="checkEmail()">
</div>`;
}

function checkEmail(){

const emailEl = document.getElementById("email");
const email = emailEl ? emailEl.value.trim() : "";

const valid = /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(email);

if(valid) showPay();
else document.getElementById("step-pay").innerHTML = "";
}

/* STEP 4 */
function showPay(){

document.getElementById("step-pay").innerHTML = `
<div class="slide-up">

<button class="pay" id="payBtn" onclick="payToCheck()">
Pay to Check $1.99
</button>

<div class="notice">
Result will be processed within 24 hours
</div>

</div>`;
}

/* PAYMENT */
async function payToCheck(){

if(isProcessing) return;
isProcessing = true;

const email = document.getElementById("email")?.value.trim();

if(!imei || !type || !email){
alert("Enter valid email and all fields");
isProcessing = false;
return;
}

const btn = document.getElementById("payBtn");
if(btn){
btn.disabled = true;
btn.innerHTML = "Redirecting to payment...";
}

try{

const res = await fetch(API_URL + "/create-payment", {
method:"POST",
headers:{"Content-Type":"application/json"},
body: JSON.stringify({
deviceId: imei,
email: email,
type: type
})
});

const data = await res.json();

if(data.url){
window.location.href = data.url;
}else{
throw new Error(data.error || "Payment error");
}

}catch(e){

document.getElementById("step-pay").innerHTML = `
<div class="slide-up">

<button class="pay" onclick="payToCheck()" id="payBtn">
Pay to Check $1.99
</button>

<div class="notice">
Connection error. Try again
</div>

</div>`;

isProcessing = false;

}

}

</script>

</body>
</html>
