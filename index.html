<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iPhone IMEI Check</title>

<style>
body{
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont, "Segoe UI";
  background:#f5f5f7;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card{
  width:340px;
  background:white;
  padding:26px;
  border-radius:18px;
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
  text-align:center;
}

h2{
  margin:0;
  font-size:22px;
  font-weight:600;
  color:#111;
}

.small{
  margin-top:6px;
  font-size:12px;
  color:#888;
}

input{
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:12px;
  border:1px solid #e5e5e5;
  outline:none;
  font-size:15px;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:12px;
  font-size:15px;
  cursor:pointer;
}

.check{
  background:#0071e3;
  color:white;
}

.pay{
  background:#34c759;
  color:white;
  display:none;
}
</style>
</head>

<body>

<div class="card">

  <h2>iPhone IMEI Check</h2>

  <div class="small">Only for Apple devices</div>

  <input id="imei" placeholder="Enter IMEI">
  <input id="email" placeholder="Enter Email">

  <button class="check" onclick="check()">Check</button>
  <button id="payBtn" class="pay" onclick="pay()">Pay $1.99</button>

</div>

<script>
let imei = "";
let email = "";

function check(){
  imei = document.getElementById("imei").value;
  email = document.getElementById("email").value;

  if(!imei || !email){
    alert("Fill all fields");
    return;
  }

  document.getElementById("payBtn").style.display="block";
}

function pay(){
  alert("Connect backend here");
}
</script>

</body>
</html>
