<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<title>1Chip</title>

<link rel="icon" href="images/logo.jpeg">
<link rel="apple-touch-icon" href="images/logo.jpeg">

<meta name="description" content="IMEI Check service for Apple devices">

<style>
*{box-sizing:border-box;}

body{
margin:0;
font-family:-apple-system, BlinkMacSystemFont, "Segoe UI";
background:#f2f2f7;
-webkit-font-smoothing:antialiased;
}

.screen{
padding:55px 16px calc(40px + env(safe-area-inset-bottom));
max-width:420px;
margin:0 auto;
animation:fade .3s ease;
}

@keyframes fade{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;transform:translateY(0);}
}

.logo{
display:flex;
justify-content:center;
margin-bottom:15px;
}

.logo img{
width:95px;height:95px;
border-radius:50%;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
animation:pop .4s ease;
}

@keyframes pop{
from{transform:scale(.8);opacity:0;}
to{transform:scale(1);opacity:1;}
}

h2{
font-size:22px;
font-weight:600;
margin:0;
text-align:center;
}

.sub{
font-size:13px;
color:#8e8e93;
text-align:center;
margin-bottom:20px;
}

.block{
background:#fff;
border-radius:16px;
border:1px solid #e5e5ea;
padding:12px;
margin-bottom:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.03);
animation:slide .25s ease;
}

@keyframes slide{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;transform:translateY(0);}
}

input{
width:100%;
padding:14px;
border:none;
outline:none;
font-size:15px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:14px;
font-size:15px;
cursor:pointer;
background:#0a84ff;
color:#fff;
font-weight:600;
transition:.2s;
}

button:active{transform:scale(.98);}

.pay{background:#34c759;}

.row{
padding:14px;
border:1px solid #e5e5ea;
border-radius:12px;
margin-bottom:10px;
cursor:pointer;
transition:.2s;
}

.row:active{transform:scale(.98);}

.row.active{
border:2px solid #0a84ff;
background:#eef5ff;
}

.back{
font-size:13px;
color:#0a84ff;
margin-bottom:10px;
cursor:pointer;
}

.error{
background:#ff3b30;
color:#fff;
padding:12px;
border-radius:12px;
margin-bottom:10px;
animation:shake .25s;
}

@keyframes shake{
0%{transform:translateX(0);}
25%{transform:translateX(-5px);}
50%{transform:translateX(5px);}
100%{transform:translateX(0);}
}

.loading{
text-align:center;
padding:20px;
color:#8e8e93;
}

</style>
</head>

<body>

<div class="screen">

<div class="logo">
<img src="images/logo.jpeg">
</div>

<h2>IMEI Check</h2>
<div class="sub">Only for Apple devices</div>

<div id="imeiBlock" class="block">
<input id="imeiInput" placeholder="Enter IMEI/SN">
<button onclick="setIMEI(this)">Continue</button>
</div>

<div id="typeBlock"></div>
<div id="emailBlock"></div>
<div id="payBlock"></div>

</div>

<script>

const API_URL = "https://imei-info.onrender.com";

let imei="", type="", detectedType="";

/* ---------- IMEI ---------- */
function setIMEI(btn){

imei = document.getElementById("imeiInput").value.trim();

const isIMEI = /^\d{15}$/.test(imei);
const isSN = /^(?=.*[A-Za-z0-9])[A-Za-z0-9]{10,12}$/.test(imei);

if(!isIMEI && !isSN){
document.getElementById("imeiBlock").innerHTML =
`<div class="error">Invalid IMEI / SN</div>
<input id="imeiInput" placeholder="Enter IMEI/SN">
<button onclick="setIMEI(this)">Continue</button>`;
return;
}

btn.disabled = true;

detectedType = isIMEI ? "IMEI" : "SN";

document.getElementById("imeiBlock").innerHTML =
`<div class="loading">Checking device...</div>`;

setTimeout(()=>{
document.getElementById("imeiBlock").innerHTML =
`<div>${detectedType}: <b>${imei}</b></div>`;
showType();
},700);
}

/* ---------- TYPE ---------- */
function showType(){
document.getElementById("typeBlock").innerHTML = `
<div class="block">
<div class="back" onclick="resetAll()">← Change IMEI</div>

<div class="row" onclick="setType(this,'carrier')">Carrier status</div>
<div class="row" onclick="setType(this,'findmy')">Find My iPhone</div>
<div class="row" onclick="setType(this,'blacklist')">Blacklist check</div>
</div>`;
}

function setType(el,t){
type=t;
document.querySelectorAll(".row").forEach(e=>e.classList.remove("active"));
el.classList.add("active");
showEmail();
}

/* ---------- EMAIL ---------- */
function showEmail(){
if(document.getElementById("emailBlock").children.length) return;

document.getElementById("emailBlock").innerHTML = `
<div class="block">
<input id="email" placeholder="Enter email">
</div>`;

showPay();
}

/* ---------- PAY ---------- */
function showPay(){
if(document.getElementById("payBlock").children.length) return;

document.getElementById("payBlock").innerHTML = `
<button class="pay" onclick="pay(this)">Pay $1.99</button>`;
}

/* ---------- SAFE PAY ---------- */
async function pay(btn){

const email=document.getElementById("email").value.trim();

if(!imei||!type||!email){
alert("Fill all fields");
return;
}

const isEmail=/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
if(!isEmail){
alert("Invalid email");
return;
}

btn.innerText="Processing...";
btn.disabled=true;

/* timeout protection */
const controller=new AbortController();
const timeout=setTimeout(()=>controller.abort(),10000);

try{

const res=await fetch(API_URL+"/create-payment",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({deviceId:imei,email,type}),
signal:controller.signal
});

clearTimeout(timeout);

if(!res.ok) throw new Error();

let data;
try{
data=await res.json();
}catch{
throw new Error();
}

if(data.url){
window.location.href=data.url;
}else throw new Error();

}catch(e){
alert("Server error");
btn.innerText="Pay $1.99";
btn.disabled=false;
}

}

/* ---------- RESET ---------- */
function resetAll(){
location.reload();
}

</script>

</body>
</html>
