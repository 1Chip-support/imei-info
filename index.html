<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>IMEI Check</title>

<style>
body{
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont, "Segoe UI";
  background:#f2f2f7;
}

.screen{
  padding:55px 18px;
  max-width:420px;
  margin:0 auto;
}

h2{
  font-size:22px;
  font-weight:600;
}

.sub{
  font-size:13px;
  color:#8e8e93;
  margin-bottom:20px;
}

/* BLOCK */
.block{
  background:white;
  border-radius:14px;
  border:1px solid #e5e5ea;
  padding:14px;
  margin-bottom:12px;
}

/* TEXT ROW */
.value{
  padding:14px;
  font-size:15px;
  display:flex;
  justify-content:space-between;
}

/* LIST */
.row{
  padding:14px;
  display:flex;
  justify-content:space-between;
  cursor:pointer;
  font-size:15px;
}

.row .check{
  display:none;
  color:#0a84ff;
}

.row.active .check{
  display:block;
}

.divider{
  height:1px;
  background:#e5e5ea;
}

/* INPUT */
input{
  width:100%;
  padding:14px;
  border:none;
  outline:none;
  font-size:15px;
}

/* BUTTON */
button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:14px;
  font-size:15px;
  cursor:pointer;
  margin-top:10px;
}

.pay{
  background:#34c759;
  color:white;
  font-weight:600;
}
</style>
</head>

<body>

<div class="screen">

<h2>iPhone IMEI Check</h2>
<div class="sub">Only for Apple devices</div>

<!-- IMEI -->
<div class="block" id="imeiBlock">
  <input id="imeiInput" placeholder="Enter IMEI">
  <button onclick="setIMEI()">Continue</button>
</div>

<!-- TYPE -->
<div id="typeBlock"></div>

<!-- EMAIL -->
<div id="emailBlock"></div>

<!-- PAY -->
<div id="payBlock"></div>

</div>

<script>

const API_URL = "https://imei-info.onrender.com";

let imei = "";
let type = "carrier";

/* STEP 1: IMEI FIX */
function setIMEI(){

  imei = document.getElementById("imeiInput").value.trim();

  if(!imei){
    alert("Enter IMEI");
    return;
  }

  document.getElementById("imeiBlock").innerHTML = `
    <div class="value">
      <span>IMEI</span>
      <b>${imei}</b>
    </div>
  `;

  showType();
}

/* STEP 2: TYPE */
function showType(){

  document.getElementById("typeBlock").innerHTML = `
    <div class="block">

      <div class="row active" onclick="setType(this,'carrier')">
        Carrier status <span class="check">✓</span>
      </div>

      <div class="divider"></div>

      <div class="row" onclick="setType(this,'findmy')">
        Find My iPhone <span class="check">✓</span>
      </div>

      <div class="divider"></div>

      <div class="row" onclick="setType(this,'blacklist')">
        Blacklist check <span class="check">✓</span>
      </div>

    </div>
  `;
}

/* TYPE SELECT */
function setType(el,t){

  type = t;

  document.querySelectorAll(".row").forEach(e=>{
    e.classList.remove("active");
  });

  el.classList.add("active");

  showEmail();
}

/* STEP 3 EMAIL */
function showEmail(){

  if(document.getElementById("emailBlock").innerHTML) return;

  document.getElementById("emailBlock").innerHTML = `
    <div class="block">
      <input id="email" placeholder="Enter email">
    </div>
  `;

  showPay();
}

/* STEP 4 PAY */
function showPay(){

  if(document.getElementById("payBlock").innerHTML) return;

  document.getElementById("payBlock").innerHTML = `
    <button class="pay" onclick="payToCheck()">
      Pay to Check $1.99
    </button>
  `;
}

/* PAY */
async function payToCheck(){

  const email = document.getElementById("email").value.trim();

  if(!email){
    alert("Enter email");
    return;
  }

  const res = await fetch(API_URL + "/create-payment", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      deviceId: imei,
      email: email,
      type: type
    })
  });

  const data = await res.json();

  if(data.url){
    window.location.href = data.url;
  } else {
    alert("Payment error");
  }
}

</script>

</body>
</html>
