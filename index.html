<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>IMEI Check</title>

<style>
body{
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont, "Segoe UI";
  background:#f2f2f7;
}

.screen{
  padding:55px 18px;
  max-width:420px;
  margin:0 auto;
}

h2{
  font-size:22px;
  font-weight:600;
}

.sub{
  font-size:13px;
  color:#8e8e93;
  margin-bottom:20px;
}

/* LIST */
.list{
  background:white;
  border-radius:14px;
  overflow:hidden;
  border:1px solid #e5e5ea;
}

.row{
  padding:14px;
  display:flex;
  justify-content:space-between;
  cursor:pointer;
  font-size:15px;
}

.row .check{
  display:none;
  color:#0a84ff;
}

.row.active .check{
  display:block;
}

.divider{
  height:1px;
  background:#e5e5ea;
  margin:0;
}

/* INPUT */
.group{
  background:white;
  border-radius:14px;
  overflow:hidden;
  border:1px solid #e5e5ea;
  margin-top:12px;
}

input{
  width:100%;
  padding:14px;
  border:none;
  outline:none;
  font-size:15px;
}

/* BUTTON */
button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:14px;
  font-size:15px;
  cursor:pointer;
  margin-top:12px;
}

.pay{
  background:#34c759;
  color:white;
  font-weight:600;
}

/* HIDDEN STEPS */
.hidden{
  display:none;
}
</style>
</head>

<body>

<div class="screen">

<h2>iPhone IMEI Check</h2>
<div class="sub">Only for Apple devices</div>

<!-- STEP 1 -->
<div id="step1">
  <div class="list">

    <div class="row active" onclick="selectType(this,'carrier')">
      Carrier status <span class="check">✓</span>
    </div>

    <div class="divider"></div>

    <div class="row" onclick="selectType(this,'findmy')">
      Find My iPhone <span class="check">✓</span>
    </div>

    <div class="divider"></div>

    <div class="row" onclick="selectType(this,'blacklist')">
      Blacklist check <span class="check">✓</span>
    </div>

  </div>
</div>

<!-- STEP 2 -->
<div id="step2" class="hidden">
  <div class="group">
    <input id="email" placeholder="Enter email">
  </div>

  <button class="pay" onclick="payToCheck()">
    Continue to payment
  </button>
</div>

</div>

<script>

const API_URL = "https://imei-info.onrender.com";

let type = "carrier";
let imei = "123"; // если надо добавим позже

/* STEP 1 → STEP 2 */
function selectType(el,t){

  type = t;

  document.querySelectorAll(".row").forEach(e=>{
    e.classList.remove("active");
  });

  el.classList.add("active");

  // 🔥 SHOW NEXT STEP
  setTimeout(()=>{
    document.getElementById("step1").style.display="none";
    document.getElementById("step2").classList.remove("hidden");
  },200);
}

/* PAY */
async function payToCheck(){

  const email = document.getElementById("email").value.trim();

  if(!email){
    alert("Enter email");
    return;
  }

  const res = await fetch(API_URL + "/create-payment", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      deviceId: imei,
      email: email,
      type: type
    })
  });

  const data = await res.json();

  if(data.url){
    window.location.href = data.url;
  } else {
    alert("Payment error");
  }
}

</script>

</body>
</html>
