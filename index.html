<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>IMEI Check</title>

<style>
body{
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont, "Segoe UI";
  background:#000;
  color:white;
}

.screen{
  padding:55px 18px;
  max-width:420px;
  margin:0 auto;
}

h2{
  font-size:22px;
  font-weight:600;
}

.sub{
  font-size:13px;
  color:#8e8e93;
  margin-bottom:20px;
}

/* INPUT */
.group{
  background:#1c1c1e;
  border-radius:14px;
  overflow:hidden;
  margin-bottom:10px;
}

input{
  width:100%;
  padding:14px;
  border:none;
  outline:none;
  font-size:15px;
  background:#1c1c1e;
  color:white;
}

/* SEGMENT CONTROL */
.segment{
  display:flex;
  background:#1c1c1e;
  border-radius:12px;
  overflow:hidden;
  margin-bottom:12px;
}

.seg{
  flex:1;
  text-align:center;
  padding:10px;
  font-size:13px;
  color:#8e8e93;
  cursor:pointer;
  transition:0.2s;
}

/* 🔵 iOS BLUE SELECT */
.seg.active{
  background:#0a84ff;
  color:white;
  font-weight:600;
}

/* BUTTON */
button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:14px;
  font-size:15px;
  cursor:pointer;
}

.pay{
  background:#30d158;
  color:black;
  font-weight:600;
}
</style>
</head>

<body>

<div class="screen">

<h2>iPhone IMEI Check</h2>
<div class="sub">Only for Apple devices</div>

<!-- IMEI -->
<div class="group">
  <input id="imei" placeholder="Enter IMEI">
</div>

<!-- TYPE SELECT -->
<div class="segment">
  <div class="seg active" onclick="setType(this,'carrier')">Carrier</div>
  <div class="seg" onclick="setType(this,'findmy')">Find My</div>
  <div class="seg" onclick="setType(this,'blacklist')">Blacklist</div>
</div>

<!-- EMAIL -->
<div class="group">
  <input id="email" placeholder="Email">
</div>

<!-- PAY BUTTON -->
<button class="pay" onclick="payToCheck()">
  Pay to Check $1.99
</button>

</div>

<script>

const API_URL = "https://imei-info.onrender.com";

let type = "carrier";

/* SELECT TYPE */
function setType(el, t){

  type = t;

  document.querySelectorAll(".seg").forEach(e=>{
    e.classList.remove("active");
  });

  el.classList.add("active");
}

/* PAY */
async function payToCheck(){

  const imei = document.getElementById("imei").value.trim();
  const email = document.getElementById("email").value.trim();

  if(!imei || !email){
    alert("Fill all fields");
    return;
  }

  const res = await fetch(API_URL + "/create-payment", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      deviceId: imei,
      email: email,
      type: type
    })
  });

  const data = await res.json();

  if(data.url){
    window.location.href = data.url;
  } else {
    alert("Payment error");
  }
}

</script>

</body>
</html>
