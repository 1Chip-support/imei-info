<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>IMEI TEST</title>
</head>

<body style="font-family: Arial; text-align: center; margin-top: 100px;">

<h2>IMEI TEST</h2>

<p style="color:green; font-size:18px;">
  Price: $1.99
</p>

<input id="imei" placeholder="enter imei"
style="padding:10px; width:250px; font-size:16px;" />

<br><br>

<!-- EMAIL FIELD -->
<input id="email" placeholder="enter email"
style="padding:10px; width:250px; font-size:16px;" />

<br><br>

<button onclick="check()"
style="padding:10px 20px; font-size:16px; margin-left:10px;">
Check
</button>

<!-- PAY BUTTON -->
<button id="payBtn" onclick="pay()"
style="display:none; padding:10px 20px; font-size:16px; margin-left:10px; background:green; color:white;">
Pay $1.99
</button>

<!-- SPINNER -->
<div id="spinner" style="display:none; margin-top:15px;">
  <div style="
    width:30px;
    height:30px;
    border:4px solid #ccc;
    border-top:4px solid #333;
    border-radius:50%;
    margin:0 auto;
    animation: spin 1s linear infinite;
  "></div>
</div>

<!-- RESULT -->
<div id="resultCard" style="
  display:none;
  margin-top:20px;
  padding:15px;
  border-radius:10px;
  width:320px;
  margin-left:auto;
  margin-right:auto;
  background:#f5f5f5;
  font-size:18px;
"></div>

<script>
const API_URL = "https://imei-info.onrender.com";

let currentIMEI = "";
let currentEmail = "";

/* =========================
CHECK
========================= */
async function check() {
  const imei = document.getElementById("imei").value;
  const email = document.getElementById("email").value;

  if (!imei) return alert("Enter IMEI");
  if (!email) return alert("Enter email");

  currentIMEI = imei;
  currentEmail = email;

  document.getElementById("spinner").style.display = "block";

  const res = await fetch(API_URL + "/check", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ 
      deviceId: imei,
      email: email
    })
  });

  const data = await res.json();

  document.getElementById("spinner").style.display = "none";

  document.getElementById("payBtn").style.display = "inline-block";

  document.getElementById("resultCard").style.display = "block";
  document.getElementById("resultCard").innerHTML =
    "📌 Request created. Now pay to continue.";
}

/* =========================
PAY
========================= */
async function pay() {
  if (!currentIMEI) return alert("Check IMEI first");

  const res = await fetch(API_URL + "/create-payment", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ 
      deviceId: currentIMEI,
      email: currentEmail
    })
  });

  const data = await res.json();

  if (data.url) {
    window.location.href = data.url;
  } else {
    alert("Payment error");
  }
}
</script>

</body>
</html>
