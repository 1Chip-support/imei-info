<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<meta name="google-site-verification" content="HRJpJ0clkSqAImGWA64Pq8LhbVVCt9oawE6DovFubx8" />

<title>1Chip</title>

<link rel="icon" type="image/jpeg" href="images/logo.jpeg">
<link rel="apple-touch-icon" href="images/logo.jpeg">

<meta name="application-name" content="1Chip">
<meta name="apple-mobile-web-app-title" content="1Chip">

<meta property="og:title" content="1Chip">
<meta property="og:site_name" content="1Chip">
<meta property="og:description" content="Only for Apple devices">
<meta property="og:image" content="https://imei-info.pages.dev/images/logo.jpeg">
<meta property="og:type" content="website">

<meta name="description" content="IMEI Check service for Apple devices">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a84ff">

<style>
*{box-sizing:border-box;}

body{
margin:0;
font-family:-apple-system, BlinkMacSystemFont, "Segoe UI";
background:#f2f2f7;
overflow-x:hidden;
-webkit-font-smoothing:antialiased;
}

/* iOS smooth screen animation */
.screen{
padding:55px 16px calc(40px + env(safe-area-inset-bottom));
max-width:420px;
margin:0 auto;
animation:fadeIn 0.6s ease;
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(10px);}
to{opacity:1; transform:translateY(0);}
}

h2{
font-size:22px;
font-weight:600;
margin:0 0 5px 0;
animation:slideUp 0.5s ease;
}

.sub{
font-size:13px;
color:#8e8e93;
margin-bottom:20px;
animation:slideUp 0.6s ease;
}

@keyframes slideUp{
from{opacity:0; transform:translateY(8px);}
to{opacity:1; transform:translateY(0);}
}

.logo{
display:flex;
justify-content:center;
margin-bottom:15px;
animation:pop 0.7s ease;
}

@keyframes pop{
0%{transform:scale(0.8); opacity:0;}
100%{transform:scale(1); opacity:1;}
}

.logo img{
width:95px;
height:95px;
border-radius:50%;
object-fit:cover;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
transition:0.3s;
}

.block{
background:rgba(255,255,255,0.85);
backdrop-filter: blur(12px);
border-radius:14px;
border:1px solid #e5e5ea;
padding:12px;
margin-bottom:12px;
animation:fadeIn 0.4s ease;
}

input{
width:100%;
padding:14px;
border:none;
outline:none;
font-size:15px;
background:transparent;
}

.value{
padding:14px;
font-size:15px;
word-break:break-all;
}

.label{
font-size:12px;
color:#8e8e93;
margin-top:5px;
}

.row{
padding:14px;
cursor:pointer;
font-size:15px;
border:1px solid #e5e5ea;
border-radius:12px;
margin-bottom:10px;
background:#fff;
transition:0.25s cubic-bezier(.2,.8,.2,1);
}

/* iOS-like press animation */
.row:active{
transform:scale(0.97);
}

.row.active{
border:2px solid #0a84ff;
background:#eef5ff;
transform:scale(1.01);
}

button{
width:100%;
padding:14px;
border:none;
border-radius:14px;
font-size:15px;
cursor:pointer;
margin-top:10px;
background:#0a84ff;
color:#fff;
font-weight:600;
transition:0.25s cubic-bezier(.2,.8,.2,1);
}

button:active{
transform:scale(0.96);
}

.pay{
background:#34c759;
color:white;
font-weight:600;
}

.error{
background:#ff3b30;
color:#fff;
padding:12px;
border-radius:12px;
font-size:14px;
margin-bottom:10px;
animation:shake 0.3s ease;
}

@keyframes shake{
0%,100%{transform:translateX(0);}
25%{transform:translateX(-4px);}
50%{transform:translateX(4px);}
75%{transform:translateX(-2px);}
}

.loading{
text-align:center;
padding:20px;
font-size:14px;
color:#8e8e93;
animation:pulse 1s infinite;
}

@keyframes pulse{
0%,100%{opacity:0.5;}
50%{opacity:1;}
}
</style>
</head>

<body>

<div class="screen">

<div class="logo">
<img src="images/logo.jpeg" alt="logo">
</div>

<h2>IMEI Check</h2>
<div class="sub">Only for Apple devices</div>

<div class="block" id="imeiBlock">
<input id="imeiInput" placeholder="Enter IMEI/SN">
<button onclick="setIMEI()">Continue</button>
</div>

<div id="typeBlock"></div>
<div id="emailBlock"></div>
<div id="payBlock"></div>

</div>

<script>

const API_URL = "https://imei-info.onrender.com";

let imei = "";
let type = "";
let detectedType = "";

function setIMEI(){

imei = document.getElementById("imeiInput").value.trim();

const isIMEI = /^\d{15}$/.test(imei);
const isSN = /^(?=.*[A-Za-z])[A-Za-z0-9]{10,12}$/.test(imei);

if(isIMEI) detectedType = "IMEI";
else if(isSN) detectedType = "SN";
else{
document.getElementById("imeiBlock").innerHTML = `
<div class="error">
❌ Invalid IMEI / SN<br>
IMEI = 15 digits<br>
SN = 10-12 letters/numbers (must contain letters)
</div>
<input id="imeiInput" placeholder="Enter IMEI/SN">
<button onclick="setIMEI()">Continue</button>
`;
return;
}

document.getElementById("imeiBlock").innerHTML = `
<div class="loading">Checking device...</div>
`;

setTimeout(()=>{
document.getElementById("imeiBlock").innerHTML = `
<div class="value">
${detectedType}: <b>${imei}</b>
<div class="label">${detectedType} detected</div>
</div>
`;
showType();
}, 1200);
}

function showType(){

document.getElementById("typeBlock").innerHTML = `
<div class="block">

<div class="row" onclick="setType(this,'carrier')">Carrier status</div>
<div class="row" onclick="setType(this,'findmy')">Find My iPhone</div>
<div class="row" onclick="setType(this,'blacklist')">Blacklist check</div>

</div>
`;
}

function setType(el,t){

type = t;

document.querySelectorAll(".row").forEach(e=>{
e.classList.remove("active");
});

el.classList.add("active");

showEmail();
}

function showEmail(){

if(document.getElementById("emailBlock").innerHTML) return;

document.getElementById("emailBlock").innerHTML = `
<div class="block">
<input id="email" placeholder="Enter email">
</div>
`;

showPay();
}

function showPay(){

if(document.getElementById("payBlock").innerHTML) return;

document.getElementById("payBlock").innerHTML = `
<button class="pay" onclick="payToCheck()">
Pay to Check $1.99
</button>
`;
}

async function payToCheck(){

const email = document.getElementById("email").value.trim();

if(!imei || !type || !email){
alert("Fill all fields");
return;
}

const res = await fetch(API_URL + "/create-payment", {
method:"POST",
headers:{"Content-Type":"application/json"},
body: JSON.stringify({
deviceId: imei,
email: email,
type: type
})
});

const data = await res.json();

if(data.url){
window.location.href = data.url;
} else {
alert("Payment error");
}
}

</script>

</body>
</html>
