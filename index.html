<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<title>1Chip</title>

<link rel="icon" type="image/jpeg" href="images/logo.jpeg">
<link rel="apple-touch-icon" href="images/logo.jpeg">

<meta name="description" content="IMEI Check service for Apple devices">

<style>
*{box-sizing:border-box;}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI";
background:#f2f2f7;
}

.screen{
padding:55px 16px calc(40px + env(safe-area-inset-bottom));
max-width:420px;
margin:0 auto;
}

.logo{
display:flex;
justify-content:center;
margin-bottom:15px;
}

.logo img{
width:95px;height:95px;
border-radius:50%;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

h2{
text-align:center;
font-size:22px;
margin:0 0 5px 0;
font-weight:600;
}

.sub{
text-align:center;
font-size:13px;
color:#8e8e93;
margin-bottom:20px;
}

.block{
background:#fff;
border-radius:14px;
border:1px solid #e5e5ea;
padding:12px;
margin-bottom:12px;
}

input{
width:100%;
padding:14px;
border:none;
outline:none;
font-size:15px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:14px;
font-size:15px;
cursor:pointer;
margin-top:10px;
background:#0a84ff;
color:#fff;
font-weight:600;
}

.pay{
background:#34c759;
}

.row{
padding:14px;
cursor:pointer;
border:1px solid #e5e5ea;
border-radius:12px;
margin-bottom:10px;
background:#fff;
}

.row.active{
border:2px solid #0a84ff;
background:#eef5ff;
}

.loading{
text-align:center;
padding:20px;
color:#8e8e93;
}

.error{
background:#ff3b30;
color:#fff;
padding:12px;
border-radius:12px;
margin-bottom:10px;
}
</style>
</head>

<body>

<div class="screen">

<div class="logo">
<img src="images/logo.jpeg">
</div>

<h2>IMEI Check</h2>
<div class="sub">Only for Apple devices</div>

<div class="block" id="imeiBlock">
<input id="imeiInput" placeholder="Enter IMEI/SN">
<button onclick="setIMEI()">Continue</button>
</div>

<div id="typeBlock"></div>
<div id="emailBlock"></div>
<div id="payBlock"></div>

</div>

<script>

const API_URL="https://imei-info.onrender.com";

let imei="",type="";

/* ---------- IMEI ---------- */
function setIMEI(){

imei=document.getElementById("imeiInput").value.trim();

const isIMEI=/^\d{15}$/.test(imei);
const isSN=/^(?=.*[A-Za-z])[A-Za-z0-9]{10,12}$/.test(imei);

if(!isIMEI && !isSN){
document.getElementById("imeiBlock").innerHTML=`
<div class="error">Invalid IMEI / SN</div>
<input id="imeiInput" placeholder="Enter IMEI/SN">
<button onclick="setIMEI()">Continue</button>`;
return;
}

document.getElementById("imeiBlock").innerHTML=
`<div class="loading">Checking device...</div>`;

setTimeout(()=>{
document.getElementById("imeiBlock").innerHTML=
`<div>${isIMEI?"IMEI":"SN"}: <b>${imei}</b></div>`;
showType();
},800);
}

/* ---------- TYPE ---------- */
function showType(){
document.getElementById("typeBlock").innerHTML=`
<div class="block">
<div class="row" onclick="setType(this,'carrier')">Carrier status</div>
<div class="row" onclick="setType(this,'findmy')">Find My iPhone</div>
<div class="row" onclick="setType(this,'blacklist')">Blacklist check</div>
</div>`;
}

function setType(el,t){
type=t;
document.querySelectorAll(".row").forEach(e=>e.classList.remove("active"));
el.classList.add("active");
showEmail();
}

/* ---------- EMAIL ---------- */
function showEmail(){

document.getElementById("emailBlock").innerHTML=`
<div class="block">
<input id="email" placeholder="Enter email" oninput="showPayBtn()">
</div>`;
}

/* ---------- SHOW PAY ONLY AFTER EMAIL ---------- */
function showPayBtn(){

const email=document.getElementById("email").value.trim();
const valid=/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);

if(!valid) return;

document.getElementById("payBlock").innerHTML=`
<button class="pay" onclick="pay(this)">Pay $1.99</button>`;
}

/* ---------- PAY ---------- */
async function pay(btn){

const email=document.getElementById("email").value.trim();

if(!imei||!type||!email){
alert("Fill all fields");
return;
}

btn.disabled=true;
btn.innerText="Processing...";

try{

const res=await fetch(API_URL+"/create-payment",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({deviceId:imei,email,type})
});

if(!res.ok) throw new Error();

const data=await res.json();

if(data.url){
window.location.href=data.url;
}else throw new Error();

}catch(e){
alert("Server error");
btn.disabled=false;
btn.innerText="Pay $1.99";
}

}

</script>

</body>
</html>
