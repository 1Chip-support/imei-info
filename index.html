<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<title>1Chip</title>

<link rel="icon" href="images/logo.jpeg">
<link rel="apple-touch-icon" href="images/logo.jpeg">

<meta name="description" content="IMEI Check service for Apple devices">

<style>
*{box-sizing:border-box;}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI";
background:#f2f2f7;
-webkit-font-smoothing:antialiased;
}

.screen{
max-width:420px;
margin:0 auto;
padding:55px 16px calc(40px + env(safe-area-inset-bottom));
animation:fade .35s ease;
}

@keyframes fade{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;transform:translateY(0);}
}

.logo{
display:flex;
justify-content:center;
margin-bottom:15px;
}

.logo img{
width:95px;height:95px;
border-radius:50%;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
animation:pop .4s ease;
}

@keyframes pop{
from{transform:scale(.8);opacity:0;}
to{transform:scale(1);opacity:1;}
}

h2{
text-align:center;
font-size:22px;
margin:0;
font-weight:600;
}

.sub{
text-align:center;
font-size:13px;
color:#8e8e93;
margin-bottom:20px;
}

.block{
background:#fff;
border-radius:16px;
border:1px solid #e5e5ea;
padding:12px;
margin-bottom:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.03);
animation:slide .25s ease;
}

@keyframes slide{
from{opacity:0;transform:translateY(8px);}
to{opacity:1;transform:translateY(0);}
}

input{
width:100%;
padding:14px;
border:none;
outline:none;
font-size:15px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:14px;
font-size:15px;
cursor:pointer;
background:#0a84ff;
color:#fff;
font-weight:600;
transition:.2s;
}

button:active{transform:scale(.98);}

.pay{background:#34c759;}

.row{
padding:14px;
border:1px solid #e5e5ea;
border-radius:12px;
margin-bottom:10px;
cursor:pointer;
transition:.2s;
}

.row.active{
border:2px solid #0a84ff;
background:#eef5ff;
}

.info{
text-align:center;
font-size:13px;
color:#8e8e93;
margin-top:8px;
animation:fade 1s ease;
}

.notice{
background:#f1f5ff;
border:1px solid #d6e4ff;
padding:12px;
border-radius:12px;
font-size:13px;
color:#1c1c1e;
margin-top:10px;
animation:fade .4s ease;
}

.loading{
text-align:center;
padding:20px;
color:#8e8e93;
}

.error{
background:#ff3b30;
color:#fff;
padding:12px;
border-radius:12px;
margin-bottom:10px;
animation:shake .25s;
}

@keyframes shake{
0%{transform:translateX(0);}
25%{transform:translateX(-5px);}
50%{transform:translateX(5px);}
100%{transform:translateX(0);}
}

.hidden{display:none;}

</style>
</head>

<body>

<div class="screen">

<div class="logo">
<img src="images/logo.jpeg">
</div>

<h2>IMEI Check</h2>
<div class="sub">Only for Apple devices</div>

<div id="imeiBlock" class="block">
<input id="imeiInput" placeholder="Enter IMEI/SN">
<button onclick="setIMEI()">Continue</button>
</div>

<div id="typeBlock"></div>
<div id="emailBlock"></div>
<div id="payBlock"></div>

</div>

<script>

const API_URL="https://imei-info.onrender.com";

let imei="",type="";

/* ---------- IMEI ---------- */
function setIMEI(){

imei=document.getElementById("imeiInput").value.trim();

const isIMEI=/^\d{15}$/.test(imei);
const isSN=/^[A-Z0-9]{10,12}$/.test(imei);

if(!isIMEI && !isSN){
document.getElementById("imeiBlock").innerHTML=`
<div class="error">Invalid IMEI / SN</div>
<input id="imeiInput" placeholder="Enter IMEI/SN">
<button onclick="setIMEI()">Continue</button>`;
return;
}

document.getElementById("imeiBlock").innerHTML=
`<div class="loading">Checking device...</div>`;

setTimeout(()=>{
document.getElementById("imeiBlock").innerHTML=
`<div>${isIMEI?"IMEI":"SN"}: <b>${imei}</b></div>`;
showType();
},800);
}

/* ---------- TYPE ---------- */
function showType(){
document.getElementById("typeBlock").innerHTML=`
<div class="block">
<div class="row" onclick="setType(this,'carrier')">Carrier status</div>
<div class="row" onclick="setType(this,'findmy')">Find My iPhone</div>
<div class="row" onclick="setType(this,'blacklist')">Blacklist check</div>
</div>`;
}

function setType(el,t){
type=t;
document.querySelectorAll(".row").forEach(e=>e.classList.remove("active"));
el.classList.add("active");
showEmail();
}

/* ---------- EMAIL ---------- */
function showEmail(){

document.getElementById("emailBlock").innerHTML=`
<div class="block">
<input id="email" placeholder="Enter email" oninput="emailNotice()">
</div>`;
}

/* ---------- NOTICE AFTER EMAIL ---------- */
function emailNotice(){

const email=document.getElementById("email").value.trim();
const valid=/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);

if(!valid){
document.getElementById("payBlock").innerHTML="";
return;
}

document.getElementById("payBlock").innerHTML=`
<div class="notice">
Your request will be processed within 24 hours.
</div>

<button class="pay" onclick="pay(this)">Pay $1.99</button>
`;
}

/* ---------- PAY ---------- */
async function pay(btn){

const email=document.getElementById("email").value.trim();

if(!imei||!type||!email){
alert("Fill all fields");
return;
}

btn.disabled=true;
btn.innerText="Processing...";

try{

const res=await fetch(API_URL+"/create-payment",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({deviceId:imei,email,type})
});

if(!res.ok) throw new Error();

const data=await res.json();

if(data.url){
window.location.href=data.url;
}else throw new Error();

}catch(e){
alert("Server error");
btn.disabled=false;
btn.innerText="Pay $1.99";
}

}

</script>

</body>
</html>
